<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Iniciar Sesión | Cursos Virtuales</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-white-700 text-white font-sans flex items-center justify-center min-h-screen">

    <div class="bg-white-800 p-10 rounded-3xl shadow-2xl w-full max-w-lg">
        <h2 class="text-3xl font-bold mb-6 text-center">Bienvenido de nuevo</h2>
        <p class="text-slate-400 text-center mb-8">Continúa con tu aprendizaje 📚</p>

        <form class="space-y-5">
            <div>
                <label class="block text-sm font-medium text-slate-300 mb-2">Correo electrónico</label>
                <input type="email" placeholder="tu@email.com" class="w-full px-4 py-3 rounded-xl bg-white-700 border border-slate-600 focus:ring-2 focus:ring-blue-500 outline-none transition-all">
            </div>
            
            <div>
                <label class="block text-sm font-medium text-slate-300 mb-2">Contraseña</label>
                <input type="password" placeholder="••••••••" class="w-full px-4 py-3 rounded-xl bg-white-700 border border-slate-600 focus:ring-2 focus:ring-blue-500 outline-none transition-all">
                <div class="text-right mt-2">
                    <a href="#" class="text-sm text-blue-400 hover:underline">¿Olvidaste tu contraseña?</a>
                </div>
            </div>
            
            <button class="w-full bg-blue-600 py-4 rounded-xl font-bold hover:bg-blue-700 transition-all shadow-lg shadow-blue-900/20">
                Entrar
            </button>
        </form>

        <div class="text-center mt-8 pt-6 border-t border-slate-700">
            <p class="text-slate-400">
                ¿No tienes cuenta? 
                <a href="registro.html" class="text-blue-400 font-semibold hover:underline">Regístrate gratis</a>
            </p>
            <div class="mt-4">
                <a href="index.html" class="text-sm text-slate-500 hover:text-white transition-colors">← Volver al inicio</a>
            </div>
        </div>
    </div>

</body>
</html>
