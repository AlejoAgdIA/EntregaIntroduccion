<!DOCTYPE html>
<html lang="es">
<head>
    <link rel="icon" href="logo.png" type="image/png">
    <meta charset="UTF-8">
    <title>Registro | CursosOnline</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: { primario: '#4a90e2', secundario: '#2ecc71', texto: '#333', fondo: '#f8f9fa' }
                }
            }
        }
    </script>
</head>
<body class="font-sans leading-[1.6] text-texto bg-fondo">

<nav class="bg-white py-4 border-b-[3px] border-primario">
    <div class="max-w-[1200px] mx-auto px-4 flex flex-col md:flex-row justify-between items-center">
        <div class="text-[1.8rem] font-bold text-primario">CursosOnline</div>
        <ul class="flex flex-col md:flex-row list-none gap-8 items-center mt-4 md:mt-0">
            <li><a href="index.html" class="no-underline text-texto px-4 py-2 hover:text-primario">Inicio</a></li>
            <li><a href="cursos.html" class="no-underline text-texto px-4 py-2 hover:text-primario">Cursos</a></li>
            <li><a href="caracteristicas.html" class="no-underline text-texto px-4 py-2 hover:text-primario">Características</a></li>
        </ul>
    </div>
</nav>

<section class="py-8 px-0">
    <div class="max-w-[1200px] mx-auto px-4">
        <h2 class="text-center text-[2.5rem] mb-8 text-primario font-bold">Registro</h2>

        <form class="max-w-[600px] mx-auto bg-white p-8 border-2 border-primario" action="#" method="post">
            <div class="mb-6">
                <label class="block mb-1">Nombre de usuario</label>
                <input type="text" name="usuario" placeholder="Nombre de usuario" class="w-full p-[10px] border border-gray-300" required>
            </div>

            <div class="mb-6">
                <label class="block mb-1">Correo electrónico</label>
                <input type="email" name="correo" placeholder="Correo" class="w-full p-[10px] border border-gray-300" required>
            </div>

            <div class="mb-6">
                <label class="block mb-1">Contraseña</label>
                <input type="password" name="password" placeholder="Contraseña" class="w-full p-[10px] border border-gray-300" required>
            </div>

            <div class="mb-6">
                <label class="block mb-1">Confirmar contraseña</label>
                <input type="password" name="confirmar_password" placeholder="Confirmar contraseña" class="w-full p-[10px] border border-gray-300" required>
            </div>

            <button type="submit" class="inline-block bg-secundario text-white px-6 py-3 rounded-[5px] font-semibold w-full">Registrarse</button>
        </form>
    </div>
</section>

<footer class="bg-texto text-white text-center py-8">
    <p>CursosOnline © 2026</p>
</footer>

</body>
</html>
