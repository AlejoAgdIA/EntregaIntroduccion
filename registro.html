<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Registro | Cursos Virtuales</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-fondo m-0 p-0 text-white font-sans flex items-center justify-center min-h-screen">

    <div class="bg-white-800 p-10 rounded-3xl shadow-2xl w-full max-w-lg">
        <h2 class="text-3xl font-bold mb-6 text-center">Crear cuenta</h2>
        <p class="text-slate-400 text-center mb-8">Únete a la comunidad de aprendizaje 🚀</p>

        <form class="space-y-5">
            <input type="text" placeholder="Nombre completo" class="w-full px-4 py-3 rounded-xl bg-white-700 border border-slate-600 focus:ring-2 focus:ring-blue-500 outline-none">
            <input type="email" placeholder="Correo electrónico" class="w-full px-4 py-3 rounded-xl bg-white-700 border border-slate-600 focus:ring-2 focus:ring-blue-500 outline-none">
            <input type="password" placeholder="Contraseña" class="w-full px-4 py-3 rounded-xl bg-white-700 border border-slate-600 focus:ring-2 focus:ring-blue-500 outline-none">
            
            <button class="w-full bg-blue-600 py-4 rounded-xl font-bold hover:bg-blue-700 transition-all">Registrarme</button>
        </form>

        <div class="text-center mt-6">
            <a href="index.html" class="text-blue-400 hover:underline">← Volver al inicio</a>
        </div>
    </div>

</body>
</html>
