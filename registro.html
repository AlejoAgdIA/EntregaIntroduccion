<!DOCTYPE html>
<html lang="es">
<head>
    <link rel="icon" href="logo.png" type="image/png">
    <meta charset="UTF-8">
    <title>Registro | CursosOnline</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<nav class="navegacion">
    <div class="contenedor nav-contenedor">
        <div class="logo">CursosOnline</div>
        <ul class="nav-menu">
            <li><a href="index.html">Inicio</a></li>
            <li><a href="cursos.html">Cursos</a></li>
            <li><a href="caracteristicas.html">Características</a></li>
        </ul>
    </div>
</nav>

<section class="seccion">
    <div class="contenedor">
        <h2 class="titulo-seccion">Registro</h2>

        <form class="formulario-contacto" action="#" method="post">

            <div class="form-grupo">
                <label>Nombre de usuario</label>
                <input type="text" name="usuario" placeholder="Nombre de usuario" required>
            </div>

            <div class="form-grupo">
                <label>Correo electrónico</label>
                <input type="email" name="correo" placeholder="Correo" required>
            </div>

            <div class="form-grupo">
                <label>Contraseña</label>
                <input type="password" name="password" placeholder="Contraseña" required>
            </div>

            <div class="form-grupo">
                <label>Confirmar contraseña</label>
                <input type="password" name="confirmar_password" placeholder="Confirmar contraseña" required>
            </div>

            <button type="submit" class="btn btn-secundario">Registrarse</button>
        </form>
    </div>
</section>

<footer class="footer">
    <p>CursosOnline © 2026</p>
</footer>

</body>
</html>
